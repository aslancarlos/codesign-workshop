name: shellcheck

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax check (bash -n)
        run: bash -n codesign-workshop.sh

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          additional_files: codesign-workshop.sh
