name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify the distributable is in sync with src/
        run: ./build.sh --check

      - name: Syntax check (bash -n)
        run: bash -n codesign-workshop.sh

      - name: ShellCheck (generated script + build.sh)
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          additional_files: codesign-workshop.sh build.sh
          ignore_paths: src
